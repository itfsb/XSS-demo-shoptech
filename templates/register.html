{% extends "base.html" %}
{% block title %}Inscription — ShopTech{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="fw-bold mb-1 text-center">Créer un compte</h2>
          <p class="text-muted text-center small mb-4">Rejoignez ShopTech en quelques secondes</p>

          {% if error %}
          <div class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle me-1"></i> {{ error }}
          </div>
          {% endif %}

          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nom d'utilisateur</label>
              <input type="text" name="username" class="form-control" placeholder="johndoe" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Mot de passe</label>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
              <i class="bi bi-person-plus me-1"></i> S'inscrire
            </button>
          </form>

          <hr class="my-3">
          <p class="text-center small text-muted mb-0">
            Déjà un compte ?
            <a href="/login" class="text-primary fw-semibold">Connexion</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
